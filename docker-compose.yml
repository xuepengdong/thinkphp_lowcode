version: "3.8"

services:
  php:
    build: ./docker/php
    container_name: tp_php
    working_dir: /var/www
    volumes:
      - ./src:/var/www

  nginx:
    image: nginx:1.24
    container_name: tp_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www
      - ./admin-system/dist:/var/www/admin
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: tp_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thinkphp
      MYSQL_USER: tp
      MYSQL_PASSWORD: tp123456
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: